<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الساعة | viresto</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/whatsapp.css">
    <style>
        .product-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            margin-top: 40px;
            margin-bottom: 60px;
        }

        .product-image img {
            width: 100%;
            border-radius: 8px;
            transition: opacity 0.3s ease-in-out;
            opacity: 1;
        }

        .product-info h1 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .product-price {
            font-size: 1.5rem;

            font-weight: bold;
            margin-bottom: 30px;
            display: block;
        }

        .option-group {
            margin-bottom: 25px;
        }

        .option-title {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .options-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .option-btn {
            border: 1px solid var(--border-color);
            background: #fff;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            transition: var(--transition);
            min-width: 40px;
            text-align: center;
        }

        .option-btn:hover {
            border-color: var(--primary-color);
        }

        .option-btn.selected {
            background-color: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            margin-top: 20px;
        }

        .product-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .product-info h1 {
            font-size: 1.5rem;
            margin-bottom: 0;
        }

        .share-btn {
            background: none;
            border: 1px solid #d5d5d5;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #111111;
            transition: all 0.3s ease;
            margin-right: 30px;
            /* Large spacing as requested */
        }

        .share-btn:hover {
            background: #f0f0f0;
            color: #111111;
            border-color: #111111;
        }

        .product-description-section {
            margin-top: 30px;
            margin-bottom: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .product-description-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: block;
            color: #111111;
        }

        .product-description-text {
            line-height: 1.6;
            color: #555555;
            white-space: pre-line;
            /* Preserves newlines */
        }

        @media (max-width: 768px) {
            .product-details {
                grid-template-columns: 1fr;
                gap: 30px;
            }
        }
    </style>
</head>

<body>

    <!-- Header Wrapper to keep navbar and banner sticky together -->
    <div class="header-wrapper">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="container">

                <!-- 1. Icons (Left) -->
                <div class="nav-icons">
                    <!-- Cart Icon -->
                    <!-- Cart Icon -->
                    <div class="cart-wrapper" style="position: relative;">
                        <a href="#" class="cart-icon icon-btn" title="عربة التسوق" onclick="toggleMiniCart(event)">
                            <img src="images/cart.png" alt="عربة التسوق" width="26" height="26">
                            <span class="cart-count">0</span>
                        </a>

                        <!-- Mini Cart Popup -->
                        <div class="mini-cart-popup" id="miniCartPopup">
                            <div class="mini-cart-header">
                                <h3>سلة المشتريات</h3>
                                <button class="close-cart-btn" onclick="toggleMiniCart(event)">&times;</button>
                            </div>
                            <div class="mini-cart-items" id="miniCartItems">
                                <!-- Items will be injected here -->
                            </div>
                            <div class="mini-cart-footer">
                                <div class="cart-total">
                                    <span>المجموع:</span>
                                    <span id="miniCartTotal">0 ج.م</span>
                                </div>
                                <p class="shipping-note">(+ مصاريف الشحن)</p>
                                <div class="mini-cart-actions">
                                    <button class="btn btn-outline btn-block" onclick="continueShopping(event)">استكمال
                                        التسوق</button>
                                    <a href="cart" class="btn btn-block">الذهاب للشراء</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. Logo (Center - handled by CSS absolute) -->
                <a href="index" class="logo">
                    <img src="images/logo.png" alt="3lisl7" style="max-height: 100px;">
                </a>

                <!-- 3. Hamburger (Right) -->
                <div class="hamburger-menu" onclick="toggleMenu()">
                    <img src="images/nav-menu.png" alt="القائمة" width="22" height="22">
                </div>

                <!-- Side Drawer Links -->
                <ul class="nav-links" id="navLinks">
                    <li><a href="index"
                            onclick="event.preventDefault(); toggleMenu(); if(typeof toggleSearch==='function'){toggleSearch();}else{window.location.href='index';}">🔍
                            بحث</a></li>
                    <li><a href="index">الرئيسية</a></li>
                    <li><a href="index">كل الساعات</a></li>
                    <li><a href="index">رجالي</a></li>
                    <li><a href="index">حريمي</a></li>
                </ul>

                <!-- Overlay -->
                <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

            </div>
        </nav>

        <!-- Disclaimer Banner -->
        <div class="disclaimer-banner">
            <p>هذا الموقع هو نموذج تصميم تجريبى لعرض الأعمال فقط وإدارة المتجر المذكور غير مسؤوله عن أي طلبات او معاملات
                تتم
                من خلاله</p>
        </div>
    </div>

    <!-- Product Details Section -->
    <section class="container">
        <div id="product-content" class="product-details">
            <!-- Content loaded via JS -->
        </div>
    </section>

    <!-- Instagram Button -->
    <a href="https://www.instagram.com/q.s.scrubs.7?igsh=MTQydW1tOG5tZnY1eQ==" class="whatsapp-btn" target="_blank"
        title="تابعنا على انستجرام">

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>جميع الحقوق محفوظة &copy; viresto</p>
            <p style="margin-top: 10px; font-size: 1rem;">Designed By <a href="https://www.instagram.com/3lisl7"
                    target="_blank" rel="noopener noreferrer"
                    style="color: #c9a84c; text-decoration: none; font-weight: bold;">Ali Salah</a></p>
        </div>
    </footer>

    <!-- Scripts -->
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="assets/js/supabase-config.js" defer></script>

    <script src="assets/js/storage.js" defer></script>
    <script src="assets/js/main.js" defer></script>
    <script src="assets/js/product.js" defer></script>
</body>

</html>
